# yazi config for the kitty IDE explorer pane only (launched via
# YAZI_CONFIG_HOME=~/.config/yazi-ide). Your normal `yazi` is untouched.
#
# Behavior:
#   - Every file is handed to `ide-open open`, which detects the type and picks
#     the best viewer (markdown->glow, html->web tab, image->icat, video->mpv,
#     csv/xlsx->visidata, docx/pptx->LibreOffice PDF, pdf->tdf, else nvim). Each
#     opens as a TAB (kitty overlay) in the editor pane, and rendered types can
#     be morphed to an editable form with Alt+M / the tab-bar ⇄ button.
#   - Keeping all type detection in ide-open (one place) lets the morph toggle
#     reuse exactly the same routing.

[mgr]
ratio          = [0, 1, 0]   # single column: fits a narrow explorer pane
show_hidden    = true
sort_dir_first = true
linemode       = "none"

[opener]
smart = [
  { run = 'ide-open open "$@"', desc = "open (smart tab)", block = false, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "*", use = "smart" },   # route everything through ide-open's dispatcher
]
