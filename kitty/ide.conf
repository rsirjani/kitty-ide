# IDE-specific kitty config: inherits the main config, adds tab-switch keybinds.
include kitty.conf

# hover a pane to focus it (no click needed)
focus_follows_mouse yes

# Let apps read the clipboard via OSC 52 without a prompt. The carbonyl browser
# tab pastes (Ctrl+V) by asking the terminal for the clipboard this way, and
# ctrl+shift+v is taken below (switch to the vd pane), so this is the paste
# path. Tradeoff: any program running in the IDE can read the clipboard
# silently — acceptable here since they're all your own tools.
clipboard_control write-clipboard write-primary read-clipboard read-primary no-append

# clicking a URL (e.g. a link Claude prints in the claude pane) opens it as a
# carbonyl browser tab in THIS instance's editor zone, not the host's browser.
open_url_with ide-open-url

# switch focus between panes (explorer ↔ editor ↔ claude).
# Super is Hyprland's modifier, so use ctrl+shift (which reaches kitty).
map ctrl+shift+left  launch --type=background ide-pane prev
map ctrl+shift+right launch --type=background ide-pane next
map ctrl+shift+e     launch --type=background ide-pane explorer
map ctrl+shift+v     launch --type=background ide-pane vd
map ctrl+shift+period launch --type=background ide-pane editor
map ctrl+shift+t     launch --type=background ide-pane claude

# switch document tabs (the custom per-pane tab system)
map alt+bracketright launch --type=background ide-tab next
map alt+bracketleft  launch --type=background ide-tab prev
# close the active document tab (also the tab-bar "×"). ctrl+shift+w is a more
# discoverable alias -- a web tab can always be closed from the keyboard even if
# the tab bar has scrolled or mouse reporting hiccups.
map alt+w        launch --type=background ide-tab close
map ctrl+shift+w launch --type=background ide-tab close
# morph the active doc between rendered view and editable (md<->nvim, csv<->raw,
# office doc<->LibreOffice in the desktop, …); also a ⇄ button in the tab bar
map alt+m launch --type=background ide-open toggle
map ctrl+tab         launch --type=background ide-tab next
map ctrl+shift+tab   launch --type=background ide-tab prev
map alt+1 launch --type=background ide-tab 1
map alt+2 launch --type=background ide-tab 2
map alt+3 launch --type=background ide-tab 3
map alt+4 launch --type=background ide-tab 4
map alt+5 launch --type=background ide-tab 5
map alt+6 launch --type=background ide-tab 6
map alt+7 launch --type=background ide-tab 7
map alt+8 launch --type=background ide-tab 8
map alt+9 launch --type=background ide-tab 9
